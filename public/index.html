<!doctype html>
<html>
  <head>
    <title>Library System</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Library System</h1>

    <h2>Add Book</h2>

    <input id="title" placeholder="Title" />
    <input id="author" placeholder="Author" />
    <input id="copies" placeholder="Copies" />

    <button onclick="addBook()">Add</button>

    <h2>Books</h2>

    <button onclick="loadBooks()">Load Books</button>

    <ul id="bookList"></ul>

    <h2>Add Member</h2>

    <input id="mName" placeholder="Name">
    <input id="mEmail" placeholder="Email">
    <input id="mLimit" placeholder="Limit">

    <button onclick="addMember()">Add Member</button>

    <h2>Borrow</h2>

    <input id="memberId" placeholder="MemberId" />
    <input id="bookId" placeholder="BookId" />

    <button onclick="borrowBook()">Borrow</button>

    <h2>Return</h2>

    <input id="rMemberId" placeholder="MemberId" />
    <input id="rBookId" placeholder="BookId" />

    <button onclick="returnBook()">Return</button>

    <script src="script.js"></script>
  </body>
</html>
